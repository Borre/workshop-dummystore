services:
  catalog-api:
    build:
      context: ./apps/catalog-api
      dockerfile: Dockerfile
    ports:
      - "8082:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - JAVA_OPTS=-Xmx256m -Xms128m
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 15s
      timeout: 3s
      retries: 3
      start_period: 30s

  orders-api:
    build:
      context: ./apps/orders-api
    ports:
      - "8001:8000"
    environment:
      - CATALOG_API_URL=http://catalog-api:8080
    depends_on:
      catalog-api:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 3s
      retries: 3
      start_period: 10s

  gateway-api:
    build:
      context: ./apps/gateway-api
    ports:
      - "9000:9000"
    depends_on:
      catalog-api:
        condition: service_started
      orders-api:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/health"]
      interval: 15s
      timeout: 3s
      retries: 3
      start_period: 10s

  web-ui:
    build:
      context: ./apps/web-ui
    ports:
      - "5000:5000"
    depends_on:
      - gateway-api
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 15s
      timeout: 3s
      retries: 3
      start_period: 15s
