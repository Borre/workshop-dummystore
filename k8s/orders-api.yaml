apiVersion: apps/v1
kind: Deployment
metadata:
  name: orders-api
  namespace: dummystore
  labels:
    app: orders-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: orders-api
  template:
    metadata:
      labels:
        app: orders-api
    spec:
      containers:
      - name: orders-api
        image: swr.la-north-2.myhuaweicloud.com/workshop/orders-api:latest
        ports:
        - containerPort: 8000
        env:
        - name: CATALOG_API_URL
          value: "http://catalog-api:8080"
        resources:
          requests:
            memory: "128Mi"
            cpu: "250m"
          limits:
            memory: "256Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 15
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: orders-api
  namespace: dummystore
  labels:
    app: orders-api
spec:
  selector:
    app: orders-api
  ports:
  - port: 8000
    targetPort: 8000
    protocol: TCP
    name: http
  type: ClusterIP
