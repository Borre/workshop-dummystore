apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-ui
  namespace: dummystore
  labels:
    app: web-ui
spec:
  replicas: 2
  selector:
    matchLabels:
      app: web-ui
  template:
    metadata:
      labels:
        app: web-ui
    spec:
      containers:
      - name: web-ui
        image: swr.la-north-2.myhuaweicloud.com/workshop/web-ui:latest
        ports:
        - containerPort: 5000
        env:
        - name: GATEWAY_API_URL
          value: "http://gateway-api:9000"
        resources:
          requests:
            memory: "128Mi"
            cpu: "250m"
          limits:
            memory: "256Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 15
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 10
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: web-ui
  namespace: dummystore
  labels:
    app: web-ui
spec:
  selector:
    app: web-ui
  ports:
  - port: 5000
    targetPort: 5000
    protocol: TCP
    name: http
  type: ClusterIP
