apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway-api
  namespace: dummystore
  labels:
    app: gateway-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gateway-api
  template:
    metadata:
      labels:
        app: gateway-api
    spec:
      containers:
      - name: gateway-api
        image: swr.la-north-2.myhuaweicloud.com/workshop/gateway-api:latest
        ports:
        - containerPort: 9000
        env:
        - name: CATALOG_API_URL
          value: "http://catalog-api:8080"
        - name: ORDERS_API_URL
          value: "http://orders-api:8000"
        resources:
          requests:
            memory: "128Mi"
            cpu: "250m"
          limits:
            memory: "256Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 9000
          initialDelaySeconds: 15
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 9000
          initialDelaySeconds: 10
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: gateway-api
  namespace: dummystore
  labels:
    app: gateway-api
spec:
  selector:
    app: gateway-api
  ports:
  - port: 9000
    targetPort: 9000
    protocol: TCP
    name: http
  type: ClusterIP
