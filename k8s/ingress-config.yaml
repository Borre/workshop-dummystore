apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: dummystore-ingress
  namespace: dummystore
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
  - host: workshop.dummystore.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: web-ui
            port:
              number: 5000
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: gateway-api
            port:
              number: 9000
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: dummystore-config
  namespace: dummystore
data:
  APP_NAME: "DummyStore Workshop"
  LOG_LEVEL: "INFO"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: dummystore-limits
  namespace: dummystore
spec:
  limits:
  - max:
      cpu: "1"
      memory: "1Gi"
    min:
      cpu: "100m"
      memory: "64Mi"
    default:
      cpu: "500m"
      memory: "512Mi"
    defaultRequest:
      cpu: "250m"
      memory: "128Mi"
    type: Container
